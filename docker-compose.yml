services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps # 1. <--- Fermiamo Docker prima del "pnpm run build" (solo install)
    container_name: renting-app
    ports:
      - "3000:3000"
    volumes:        # 2. <--- Sincronizziamo i file per l'Hot Reloading delle tue modifiche
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development # 3. <--- Cambiamo da production a development
      # Add your environment variables here
      # - DATABASE_URL=your_database_url
      # - STRIPE_KEY=your_stripe_key
      # - SUPABASE_URL=your_supabase_url
      # - SUPABASE_ANON_KEY=your_supabase_key
    command: pnpm run dev   # 4. <--- Avviamo il server di sviluppo anziché quello di produzione
    restart: unless-stopped
    networks:
      - renting-network

  # Optional: Supabase PostgreSQL database
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: renting-db
  #   ...

networks:
  renting-network:
    driver: bridge